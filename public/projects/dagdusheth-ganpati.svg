<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Shrimant Dagdusheth Halwai Ganpati Trust Website</title>
  <desc id="desc">Custom project cover image with temple-inspired architecture and festive saffron-gold colors.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#140a2e"/>
      <stop offset="45%" stop-color="#1d3d8f"/>
      <stop offset="100%" stop-color="#2b0d00"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd45e" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ff7a18" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="temple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd985"/>
      <stop offset="100%" stop-color="#c37b1d"/>
    </linearGradient>
    <filter id="blurGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <circle cx="1170" cy="220" r="210" fill="url(#sun)"/>
  <circle cx="1170" cy="220" r="280" fill="#ffb347" opacity="0.12" filter="url(#blurGlow)"/>

  <g opacity="0.22" fill="#ffffff">
    <circle cx="160" cy="140" r="2"/>
    <circle cx="230" cy="210" r="2"/>
    <circle cx="310" cy="130" r="1.8"/>
    <circle cx="420" cy="230" r="1.5"/>
    <circle cx="1360" cy="120" r="2"/>
    <circle cx="1460" cy="190" r="1.7"/>
  </g>

  <g transform="translate(800 510)">
    <rect x="-360" y="130" width="720" height="120" rx="12" fill="#5d2f00" opacity="0.8"/>

    <rect x="-260" y="30" width="520" height="120" rx="8" fill="url(#temple)"/>
    <rect x="-320" y="95" width="640" height="60" rx="8" fill="#e6a64a"/>

    <rect x="-210" y="-60" width="420" height="110" rx="6" fill="#f3bf66"/>
    <rect x="-40" y="-120" width="80" height="70" fill="#f0b85d"/>

    <polygon points="0,-290 80,-120 -80,-120" fill="#f6ca73"/>
    <rect x="-16" y="-360" width="32" height="75" fill="#ffd985"/>
    <polygon points="0,-410 28,-360 -28,-360" fill="#ffd985"/>

    <rect x="-142" y="-18" width="62" height="68" fill="#8a4203"/>
    <rect x="80" y="-18" width="62" height="68" fill="#8a4203"/>

    <rect x="-50" y="10" width="100" height="140" rx="45" fill="#7b3200"/>
    <circle cx="0" cy="72" r="10" fill="#ffcc7a"/>
  </g>

  <rect x="60" y="640" width="980" height="180" rx="24" fill="#03122e" opacity="0.8" stroke="#4ea2ff" stroke-opacity="0.35"/>
  <text x="100" y="710" fill="#ffffff" font-size="56" font-family="Segoe UI, Arial, sans-serif" font-weight="700">
    Shrimant Dagdusheth Halwai Ganpati Trust Website
  </text>
  <text x="100" y="760" fill="#9ec7ff" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="500">
    Live Darshan • E-Seva • Donations • Events • Media Management
  </text>
</svg>
